# Mount this inside the existing `server_name dev.procurechain.co.za` block for
# the main application. Do not deploy it as a separate server block if the main
# app already owns that host.
location = /mock/graphical_dash {
    return 301 /mock/graphical_dash/;
}

location /mock/graphical_dash/ {
    alias /var/www/graphs-preview/;
    index index.html;
    try_files $uri $uri/ /mock/graphical_dash/index.html;
}
