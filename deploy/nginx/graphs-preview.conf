# Complete example for `dev.procurechain.co.za`.
# Assumptions:
# - the main ProcureChain web app is listening on 127.0.0.1:3000
# - the standalone mock graphs page is copied to /var/www/graphs-preview/
# - TLS certificates are managed by Let's Encrypt

server {
    listen 80;
    listen [::]:80;
    server_name dev.procurechain.co.za;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.procurechain.co.za;

    ssl_certificate /etc/letsencrypt/live/dev.procurechain.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.procurechain.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location = /mock/graphical_dash {
        return 301 /mock/graphical_dash/;
    }

    location /mock/graphical_dash/ {
        alias /var/www/graphs-preview/;
        index index.html;
        try_files $uri $uri/ /mock/graphical_dash/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
