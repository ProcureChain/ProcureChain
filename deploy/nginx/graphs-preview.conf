server {
    listen 80;
    listen [::]:80;
    server_name dev.procurechain.co.za;

    root /var/www/graphs-preview;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
